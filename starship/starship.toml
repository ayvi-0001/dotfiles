"$schema" = "https://starship.rs/config-schema.json"

add_newline     = true
command_timeout = 300000
follow_symlinks = true
format          = "$all$time$cmd_duration$line_break$jobs$status$container$shell$character"
right_format    = ""
scan_timeout    = 30

[character]
error_symbol   = '[´æá](bold red)'
success_symbol = '[´æá](bold green)'

[cmd_duration]
min_time          = 500
show_milliseconds = true

[direnv]
disabled = false

[status]
disabled              = false
format                = '[\[$symbol$common_meaning$signal_name$maybe_int\]]($style) '
map_symbol            = true
not_executable_symbol = "¯Öö "
not_found_symbol      = "¾▒ëÂ "
pipestatus            = true
pipestatus_format     = '\[$pipestatus\] => [$symbol$common_meaning$signal_name$maybe_int]($style) '
sigint_symbol         = "¯®¼ "
signal_symbol         = "¾▒Éï "
symbol                = "¯╝Ä "

[gcloud]
detect_env_vars = ["CLOUDSDK_CONFIG"]
disabled        = false
format          = "on [$project:$account@$domain]($style) "

[fill]
disabled = false
style    = "bold black"
symbol   = "."

[time]
disabled        = false
format          = "[$time]($style) "
style           = "bold #f0f0ff"
time_format     = "%T"
utc_time_offset = "-7"

[git_metrics]
disabled = false
format   = "[+$added]($added_style)/[-$deleted]($deleted_style) "

[git_commit]
disabled      = false
only_detached = false
tag_disabled  = false
tag_symbol    = ' ´ÉÆ '

[memory_usage]
disabled  = true
format    = "via $symbol[${ram_pct}( | ${swap_pct})]($style) "
style     = "bold dimmed white"
symbol    = "¾░ıø "
threshold = -1

[directory]
disabled          = false
read_only         = " ¾░î¥"
truncation_length = 3
use_os_path_sep   = false

